<!DOCTYPE html>
<html class="h-full" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="src/output.css" rel="stylesheet">
    <title>Gamla Upsala Livs</title>
</head>
<body class="h-full bg-amber-50">
    <nav class="sticky top-0 z-50 bg-orange-700 shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="shrink-0">
                    <a href="#" class="text-white text-xl font-bold">Gamla Upsala Livs</a>
                </div>
                <div class="hidden md:block">
                    <div class="ml-10 flex items-baseline space-x-4">
                        <a href="#" class="text-white hover:bg-orange-800 px-3 py-2 rounded-md text-sm font-medium transition-colors">Hem</a>
                        <a href="#" class="text-white hover:bg-orange-800 px-3 py-2 rounded-md text-sm font-medium transition-colors">Sortiment</a>
                        <a href="#" class="text-white hover:bg-orange-800 px-3 py-2 rounded-md text-sm font-medium transition-colors">Öppettider</a>
                        <a href="#" class="text-white hover:bg-orange-800 px-3 py-2 rounded-md text-sm font-medium transition-colors">Kontakt</a>
                    </div>
                </div>
                <div class="md:hidden">
                    <button type="button" class="text-white hover:bg-orange-800 p-2 rounded-md" onclick="document.getElementById('mobile-menu').classList.toggle('hidden')">
                        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
        <div id="mobile-menu" class="hidden md:hidden bg-orange-800">
            <div class="px-2 pt-2 pb-3 space-y-1 sm:px-3">
                <a href="#" class="text-white block hover:bg-orange-900 px-3 py-2 rounded-md text-base font-medium">Hem</a>
                <a href="#" class="text-white block hover:bg-orange-900 px-3 py-2 rounded-md text-base font-medium">Sortiment</a>
                <a href="#" class="text-white block hover:bg-orange-900 px-3 py-2 rounded-md text-base font-medium">Öppettider</a>
                <a href="#" class="text-white block hover:bg-orange-900 px-3 py-2 rounded-md text-base font-medium">Kontakt</a>
            </div>
        </div>
    </nav>
    <div class="max-w-2xl mx-auto px-4 py-12 text-center">
        <div class="bg-white rounded-2xl shadow-lg overflow-hidden relative">
            <picture>
                <source media="(min-width: 768px)" srcset="src/img/landscape.jpeg">
                <img src="src/img/portrait.jpeg" alt="Gamla Upsala Livs" class="w-full h-auto object-cover">
            </picture>
            <div class="absolute inset-0 flex flex-col justify-center items-center p-6 md:p-8">
                <div class="bg-orange-900/80 rounded-xl px-6 py-4 md:px-10 md:py-6">
                    <h2 class="text-2xl md:text-3xl font-bold text-white mb-2">Välkommen till Gamla Upsala Livs</h2>
                    <p class="text-white/90 text-sm md:text-base">Orientaliskt & internationellt sortiment</p>
                    <p class="text-white/90 text-sm md:text-base">Livsmedel från hela världen</p>
                    <p class="text-white font-medium mt-2">Öppettider: 09:00-22:00</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
